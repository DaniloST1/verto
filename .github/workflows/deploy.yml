name: Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Obter código do repositório
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Instalar dependências
        run: npm install

      - name: 🔨 Gerar versão de Produção (Build)
        run: npm run build

      - name: 📡 Instalar lftp
        run: sudo apt-get install -y lftp

      - name: 🚀 Enviar para Hostinger (FTP)
        run: |
          lftp -c "
          set ftp:ssl-allow no;
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }};
          mirror --reverse --delete --verbose ./dist/ /public_html/;
          bye
          "
